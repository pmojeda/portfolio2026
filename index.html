<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Martín Ojeda — Software Engineer. Portfolio profesional con proyectos, experiencia y contacto."
    />
    <meta name="theme-color" content="#0b0c10" />
    <title>Martín Ojeda — Software Engineer</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Netlify Forms: this hidden HTML form is detected at deploy-time.
      It must mirror the React form fields (`name`, `email`, `message`) and the form `name`.
      See: https://docs.netlify.com/forms/setup/
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
